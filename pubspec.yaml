name: newplayer
description: 盘古影视 - 全平台影视播放器
publish_to: 'none'
version: 1.0.3+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.2
  
  # HTTP & Network
  http: ^1.2.1
  
  # Storage
  shared_preferences: ^2.2.3
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3
  path_provider: ^2.1.3
  path: ^1.9.0
  
  # UI
  cached_network_image: ^3.3.1
  
  # Media / Video
  media_kit: ^1.1.11
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.4
  
  # File
  file_picker: ^8.0.0+1
  
  # Icons
  cupertino_icons: ^1.0.8
  
  # Utils
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.2
  device_info_plus: ^11.3.3
  lpinyin: ^2.0.3
  encrypt: ^5.0.3
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/fonts/
  fonts:
    - family: HarmonyOS
      fonts:
        - asset: assets/fonts/HarmonyOS_Sans_SC_Regular.ttf
